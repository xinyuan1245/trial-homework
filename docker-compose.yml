services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    ports:
      - "8081:8080"
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      - redpanda

  init-kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
    depends_on:
      - redpanda
    entrypoint: [ "sh", "-c", "sleep 5 && rpk topic create bid-requests impressions --partitions 6 --brokers redpanda:29092" ]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:29092
      - PORT=8080
      - BASE_URL=http://localhost:8080
    depends_on:
      - init-kafka
      - redis

  ingester-bids:
    build: .
    command: ["/ingester"]
    environment:
      - MODE=bids
      - TOPIC=bid-requests
      - GROUP_ID=ingester-bids
      - DIMENSIONS=campaign_id,placement_id,app_bundle
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      - init-kafka
      - redis
      - redpanda

  ingester-impressions:
    build: .
    command: ["/ingester"]
    environment:
      - MODE=impressions
      - TOPIC=impressions
      - GROUP_ID=ingester-impressions
      - DIMENSIONS=campaign_id
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      - init-kafka
      - redis
      - redpanda

  dashboard:
    build: .
    command: ["/dashboard"]
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

volumes:
  redpanda-data:
  redis-data:
